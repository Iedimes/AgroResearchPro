name: Build AgroResearch Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Analyze, test and build (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (informational)
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web
          if-no-files-found: error
