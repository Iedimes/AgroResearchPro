name: agro_research_pro

description: Advanced agricultural research platform with disease assessment, trial management, and lab results

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Core dependencies
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase SDK
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  firebase_storage: ^11.7.4
  firebase_messaging: ^14.7.21
  firebase_database: ^10.4.0

  # State management
  provider: ^6.1.1
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI & UX
  cupertino_icons: ^1.0.6
  flutter_hooks: ^0.20.3
  auto_size_text: ^3.0.0

  # Charts & Visualization
  syncfusion_flutter_charts: ^34.1.30
  fl_chart: ^0.65.0

  # HTTP & Networking
  http: ^1.2.1

  # Image Processing
  image_picker: ^1.1.2
  tflite_flutter: ^0.10.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Location & Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^12.0.0
  geocoding: ^2.1.1

  # Notifications
  timezone: ^0.9.2

  # Utilities
  logger: ^2.4.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Testing (dev only)
  mockito: ^5.4.4
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
    - assets/translations/

  # Fonts
  # (Descomentar al agregar los archivos .ttf en assets/fonts/)
  # fonts:
  #   - family: AgroIcon
  #     fonts:
  #       - asset: assets/fonts/AgroIcon.ttf
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
